name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch / minor / major)'
        required: false
        default: patch

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Resolve next version
        id: ver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"

          LATEST=$(git tag --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=1; PATCH=0
          else
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\).*/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)    PATCH=$((PATCH + 1)) ;;
            esac
          fi

          # 跳过已存在的 tag 或已发布的包版本，直到找到一个干净的号。
          while true; do
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
            VERSION="${TAG#v}"
            TAG_EXISTS=false
            PKG_EXISTS=false

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              TAG_EXISTS=true
            fi

            # 直接查询 Maven 仓库，确认该版本 jar 是否已存在。
            URL="https://maven.pkg.github.com/$OWNER/$REPO/org/example/vicky/Vicky/$VERSION/Vicky-$VERSION.jar"
            STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" -u "$OWNER:$GITHUB_TOKEN" "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              PKG_EXISTS=true
            fi
            echo "Candidate $VERSION: tag_exists=$TAG_EXISTS pkg_exists=$PKG_EXISTS (curl $STATUS)"

            if [ "$TAG_EXISTS" = "false" ] && [ "$PKG_EXISTS" = "false" ]; then
              break
            fi
            PATCH=$((PATCH + 1))
          done

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG"

      - name: Build Vicky.jar
        run: ./gradlew shadowJar -Pversion=${{ steps.ver.outputs.version }} --no-daemon --stacktrace

      - name: Stage release artifact
        run: |
          mkdir -p release
          cp build/libs/Vicky-${{ steps.ver.outputs.version }}.jar "release/Vicky-${{ steps.ver.outputs.version }}.jar"

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            release/Vicky-${{ steps.ver.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          set +e
          OUT=$(./gradlew publish -Pversion=${{ steps.ver.outputs.version }} --no-daemon --stacktrace 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -ne 0 ]; then
            # GitHub Packages 正式版本不可覆盖：版本已存在会返回 422，视为跳过而非失败。
            if echo "$OUT" | grep -q "status code 422"; then
              echo "::warning::Version ${{ steps.ver.outputs.version }} already exists in GitHub Packages — skipping publish."
              exit 0
            fi
            exit $CODE
          fi
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
