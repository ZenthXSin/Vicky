name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Resolve next version
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release: $TAG (version=$VERSION)"

      - name: Build with Gradle
        run: ./gradlew build -Pversion=${{ steps.ver.outputs.version }} --no-daemon

      - name: Create release artifact
        run: ./gradlew shadowJar -Pversion=${{ steps.ver.outputs.version }} --no-daemon

      - name: Stage release artifact
        run: |
          mkdir -p release
          cp build/libs/Vicky-${{ steps.ver.outputs.version }}.jar "release/Vicky-${{ steps.ver.outputs.version }}.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vicky-release
          path: release/*.jar

  create-github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release artifact
        run: |
          mkdir -p release
          cp build/libs/Vicky-${{ steps.ver.outputs.version }}.jar "release/Vicky-${{ steps.ver.outputs.version }}.jar"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-release-notes

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Vicky-release
          path: release

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG" release/*.jar

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./gradlew publish -Pversion=${{ steps.ver.outputs.version }} --no-daemon
