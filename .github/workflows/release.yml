name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch / minor / major)'
        required: false
        default: patch

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Resolve next version
        id: ver
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          LATEST=$(git tag --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            TAG="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\).*/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)    PATCH=$((PATCH + 1)) ;;
            esac
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          # 如果目标 tag 已存在（例如之前 release 创建失败但 tag 已创建），自动递增
          while git rev-parse "$TAG" >/dev/null 2>&1; do
            MAJOR=$(echo "$TAG" | sed 's/v\([0-9]*\).*/\1/')
            MINOR=$(echo "$TAG" | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
            PATCH=$(echo "$TAG" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          done
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG"

      - name: Build Vicky.jar
        run: ./gradlew shadowJar -Pversion=${{ steps.ver.outputs.version }} --no-daemon --stacktrace

      - name: Stage release artifact
        run: |
          mkdir -p release
          cp build/libs/Vicky-${{ steps.ver.outputs.version }}.jar "release/Vicky-${{ steps.ver.outputs.version }}.jar"

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            release/Vicky-${{ steps.ver.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if package version already exists
        id: check-pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          PKG_NAME="org.example.vicky.Vicky"
          echo "Checking package versions for $PKG_NAME..."
          RESPONSE=$(gh api "/users/$OWNER/packages/maven/$PKG_NAME/versions" 2>/dev/null || true)
          echo "Package versions response: $RESPONSE"
          EXISTING=$(echo "$RESPONSE" | jq -r ".[] | select(.name==\"$VERSION\") | .name" 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version $VERSION already exists in GitHub Packages, skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Package version $VERSION not found, will publish."
          fi

      - name: Publish to GitHub Packages
        if: steps.check-pkg.outputs.exists != 'true'
        run: ./gradlew publish -Pversion=${{ steps.ver.outputs.version }} --no-daemon --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
