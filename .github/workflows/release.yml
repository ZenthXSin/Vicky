name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch / minor / major)'
        required: false
        default: patch

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve next version
        id: ver
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          LATEST=$(git tag --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            TAG="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\).*/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)    PATCH=$((PATCH + 1)) ;;
            esac
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG"

  publish-vicky-core:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build vicky-core
        run: ./gradlew :src:main:vicky-core:build -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace

      - name: Upload vicky-core JAR
        uses: actions/upload-artifact@v4
        with:
          name: vicky-core
          path: src/main/vicky-core/build/libs/vicky-core-${{ needs.resolve-version.outputs.version }}.jar

      - name: Publish vicky-core to Maven Central
        run: ./gradlew :src:main:vicky-core:publishAndReleaseToMavenCentral -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  publish-vicky-ksp:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build vicky-ksp
        run: ./gradlew :src:main:vicky-ksp:build -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace

      - name: Upload vicky-ksp JAR
        uses: actions/upload-artifact@v4
        with:
          name: vicky-ksp
          path: src/main/vicky-ksp/build/libs/vicky-ksp-${{ needs.resolve-version.outputs.version }}.jar

      - name: Publish vicky-ksp to Maven Central
        run: ./gradlew :src:main:vicky-ksp:publishAndReleaseToMavenCentral -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  publish-vicky-script:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build vicky-script
        run: ./gradlew :src:main:vicky-script:build -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace

      - name: Upload vicky-script JAR
        uses: actions/upload-artifact@v4
        with:
          name: vicky-script
          path: src/main/vicky-script/build/libs/vicky-script-${{ needs.resolve-version.outputs.version }}.jar

      - name: Publish vicky-script to Maven Central
        run: ./gradlew :src:main:vicky-script:publishAndReleaseToMavenCentral -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  publish-vicky:
    needs: [resolve-version, publish-vicky-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Vicky (shadowJar)
        run: ./gradlew :shadowJar -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace

      - name: Upload Vicky JAR
        uses: actions/upload-artifact@v4
        with:
          name: vicky
          path: build/libs/Vicky-${{ needs.resolve-version.outputs.version }}.jar

      - name: Publish Vicky to Maven Central
        run: ./gradlew :publishAndReleaseToMavenCentral -Pversion=${{ needs.resolve-version.outputs.version }} --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  github-release:
    needs: [resolve-version, publish-vicky-core, publish-vicky-ksp, publish-vicky-script, publish-vicky]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten JARs
        run: |
          mkdir -p jars
          find release -name "*.jar" -exec cp {} jars/ \;

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: ${{ needs.resolve-version.outputs.tag }}
          generate_release_notes: true
          files: jars/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
